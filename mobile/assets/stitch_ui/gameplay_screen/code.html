<div class="relative bg-surface-container-high rounded-xl overflow-hidden aspect-[4/5] flex flex-col items-center justify-center p-8 border border-outline-variant/10">

</div>
</div>
</section>

<button class="bg-surface-container-highest hover:bg-surface-bright text-on-surface px-4 py-2 rounded-full text-xs font-bold transition-all border border-outline-variant/10">أنا فاكهة؟</button>
<button class="bg-surface-container-highest hover:bg-surface-bright text-on-surface px-4 py-2 rounded-full text-xs font-bold transition-all border border-outline-variant/10">أنا خضار؟</button>
