<html class="dark" dir="rtl" lang="ar"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

            "headline": ["Plus Jakarta Sans"],
            "body": ["Plus Jakarta Sans"],
            "label": ["Plus Jakarta Sans"]

<style>
    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #0a0e16;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="text-on-surface antialiased overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#0a0e16]/80 backdrop-blur-xl shadow-[0_0_40px_-15px_rgba(255,176,32,0.15)]">
<div class="p-2 transition-all hover:bg-white/10 active:scale-95 active:duration-100 rounded-full cursor-pointer">
<span class="material-symbols-outlined text-[#FFB020]" data-icon="group">group</span>
</div>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl text-[#FFB020]">مين أنا؟</h1>
<div class="p-2 transition-all hover:bg-white/10 active:scale-95 active:duration-100 rounded-full cursor-pointer">
<span class="material-symbols-outlined text-[#FFB020]" data-icon="share">share</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Hero Section -->
<section class="mb-10 text-right">
<div class="inline-block mb-3 px-4 py-1.5 rounded-full bg-secondary-container text-on-secondary-container text-[10px] font-bold tracking-widest uppercase">
        المرحلة التالية
      </div>
<h2 class="text-4xl font-black mb-4 leading-tight tracking-tight text-on-surface">
        اختار <span class="text-primary">باقة</span> الكلمات
      </h2>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[80%]">
        حدد المواضيع اللي تحب تلعب بيها النهاردة مع صحابك.
      </p>
</section>
<!-- Chips (Editorial Placement) -->
<div class="flex flex-wrap gap-3 mb-10 overflow-x-auto pb-2">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-highest rounded-full border border-outline-variant/20 shadow-xl rotate-[-2deg]">
<div class="w-2 h-2 rounded-full bg-tertiary shadow-[0_0_8px_#ff70da]"></div>
<span class="text-sm font-bold text-on-surface">فاكهة</span>
</div>
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-highest rounded-full border border-outline-variant/20 shadow-xl rotate-[3deg]">
<div class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_#45fda9]"></div>
<span class="text-sm font-bold text-on-surface">حيوانات</span>
</div>
</div>
<!-- Toggle Section -->
<div class="flex items-center justify-between mb-8 p-6 rounded-xl bg-surface-container-low border border-outline-variant/10">
<div class="flex flex-col gap-1">
<span class="font-bold text-on-surface">Mix Mode</span>
<span class="text-xs text-on-surface-variant">اخلط كل الكلمات من كل الفئات</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-14 h-8 bg-surface-container-highest rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary shadow-inner"></div>
</label>
</div>
<!-- Category Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Card 1 -->
<div class="glass-card relative p-6 rounded-xl overflow-hidden group cursor-pointer border border-outline-variant/15 active:scale-95 transition-all">
<div class="absolute -top-4 -left-4 w-16 h-16 bg-primary/20 blur-3xl group-hover:bg-primary/40 transition-all"></div>
<div class="relative z-10 flex flex-col items-center gap-4">
<div class="w-16 h-16 flex items-center justify-center bg-surface-container-highest rounded-2xl shadow-lg">
<span class="text-4xl">🐯</span>
</div>
<span class="font-bold text-lg text-center leading-tight">حيوانات 🐯</span>
</div>
</div>
<!-- Card 2 -->
<div class="glass-card relative p-6 rounded-xl overflow-hidden group cursor-pointer border border-primary/40 shadow-[0_0_20px_rgba(255,176,32,0.15)] active:scale-95 transition-all">
<div class="absolute top-2 right-2">
<div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-sm text-on-primary font-bold" data-icon="check">check</span>
</div>
</div>
<div class="relative z-10 flex flex-col items-center gap-4">
<div class="w-16 h-16 flex items-center justify-center bg-primary-container rounded-2xl shadow-lg">
<span class="text-4xl">🍎</span>
</div>
<span class="font-bold text-lg text-center leading-tight">فواكه 🍎</span>
</div>
</div>
<!-- Card 3 -->
<div class="glass-card relative p-6 rounded-xl overflow-hidden group cursor-pointer border border-outline-variant/15 active:scale-95 transition-all">
<div class="relative z-10 flex flex-col items-center gap-4">
<div class="w-16 h-16 flex items-center justify-center bg-surface-container-highest rounded-2xl shadow-lg">
<span class="text-4xl">🥦</span>
</div>
<span class="font-bold text-lg text-center leading-tight">خضار 🥦</span>
</div>
</div>
<!-- Card 4 -->
<div class="glass-card relative p-6 rounded-xl overflow-hidden group cursor-pointer border border-outline-variant/15 active:scale-95 transition-all">
<div class="relative z-10 flex flex-col items-center gap-4">
<div class="w-16 h-16 flex items-center justify-center bg-surface-container-highest rounded-2xl shadow-lg">
<span class="text-4xl">🛋️</span>
</div>
<span class="font-bold text-lg text-center leading-tight">جماد 🛋️</span>
</div>
</div>
<!-- Extra Card 5 -->
<div class="glass-card relative p-6 rounded-xl overflow-hidden group cursor-pointer border border-outline-variant/15 active:scale-95 transition-all">
<div class="relative z-10 flex flex-col items-center gap-4">
<div class="w-16 h-16 flex items-center justify-center bg-surface-container-highest rounded-2xl shadow-lg">
<span class="text-4xl">🍔</span>
</div>
<span class="font-bold text-lg text-center leading-tight">أكلات 🍔</span>
</div>
</div>
</div>
<!-- Bottom CTA -->
<div class="fixed bottom-28 left-0 w-full px-6 z-40">
<button class="w-full h-16 bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-black text-xl rounded-lg shadow-[0_10px_30px_rgba(241,164,12,0.3)] active:scale-95 transition-transform">
        كمل
      </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-2 bg-white/10 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<div class="flex flex-col items-center justify-center text-white/40 p-3 hover:text-white transition-colors cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-icon="home">home</span>
</div>
<div class="flex flex-col items-center justify-center bg-gradient-to-tr from-[#FFB020] to-[#f1a40c] text-[#0a0e16] rounded-full p-3 shadow-[0_0_20px_rgba(255,176,32,0.4)] active:scale-110 duration-300 ease-out cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-icon="sports_esports" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
</div>
<div class="flex flex-col items-center justify-center text-white/40 p-3 hover:text-white transition-colors cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-icon="leaderboard">leaderboard</span>
</div>
<div class="flex flex-col items-center justify-center text-white/40 p-3 hover:text-white transition-colors cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-icon="person">person</span>
</div>
</nav>
<!-- Background Decorative Blurs -->
<div class="fixed top-0 right-0 -z-10 w-[300px] h-[300px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[300px] h-[300px] bg-tertiary/10 rounded-full blur-[120px]"></div>
</body></html>
