<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;family=Cairo:wght@200..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#ea9f00",
                        "tertiary-dim": "#ff5dd9",
                        "surface-container-highest": "#202632",
                        "on-tertiary": "#500042",
                        "on-tertiary-fixed": "#34002a",
                        "surface-container-low": "#0f131c",
                        "primary-dim": "#ea9f00",
                        "primary": "#ffb22b",
                        "secondary-dim": "#2eee9c",
                        "on-tertiary-container": "#38002e",
                        "surface": "#0a0e16",
                        "on-surface-variant": "#a8abb6",
                        "secondary-fixed": "#45fda9",
                        "surface-container": "#151a23",
                        "on-secondary": "#005c39",
                        "on-tertiary-fixed-variant": "#6f005c",
                        "primary-fixed": "#faac1a",
                        "surface-bright": "#262c39",
                        "error-dim": "#d53d18",
                        "on-secondary-fixed": "#00472b",
                        "on-surface": "#eef0fc",
                        "tertiary-fixed-dim": "#ff6ad9",
                        "on-primary-fixed-variant": "#5b3b00",
                        "surface-container-high": "#1a202a",
                        "background": "#0a0e16",
                        "surface-container-lowest": "#000000",
                        "on-secondary-fixed-variant": "#006740",
                        "inverse-primary": "#825600",
                        "on-secondary-container": "#e1ffe9",
                        "on-primary": "#543600",
                        "error": "#ff7351",
                        "secondary-fixed-dim": "#2eee9c",
                        "tertiary-container": "#fe4ed7",
                        "primary-container": "#f1a40c",
                        "secondary": "#45fda9",
                        "outline": "#727580",
                        "inverse-on-surface": "#51555f",
                        "error-container": "#b92902",
                        "on-background": "#eef0fc",
                        "on-primary-fixed": "#331f00",
                        "surface-tint": "#ffb22b",
                        "outline-variant": "#444851",
                        "inverse-surface": "#f9f9ff",
                        "on-error": "#450900",
                        "surface-variant": "#202632",
                        "on-error-container": "#ffd2c8",
                        "tertiary-fixed": "#ff87dc",
                        "tertiary": "#ff70da",
                        "on-primary-container": "#472d00",
                        "surface-dim": "#0a0e16",
                        "secondary-container": "#006d43"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Cairo", "Plus Jakarta Sans"],
                        "body": ["Cairo", "Plus Jakarta Sans"],
                        "label": ["Cairo", "Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Cairo', 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .confetti-overlay {
            background-image: radial-gradient(circle at 20% 30%, #ffb22b 1px, transparent 1px),
                              radial-gradient(circle at 70% 10%, #ff70da 1px, transparent 1px),
                              radial-gradient(circle at 40% 80%, #45fda9 1px, transparent 1px),
                              radial-gradient(circle at 80% 50%, #ffb22b 1px, transparent 1px);
            background-size: 100px 100px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface selection:bg-primary/30 min-h-screen overflow-x-hidden">
<!-- Top Navigation Shell -->
<nav class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#0a0e16]/80 backdrop-blur-xl shadow-[0_0_40px_-15px_rgba(255,176,32,0.15)]">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#FFB020] hover:bg-white/10 transition-all p-2 rounded-full scale-95 active:duration-100" data-icon="group">group</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl text-[#FFB020]">مين أنا؟</h1>
</div>
<button class="material-symbols-outlined text-[#FFB020] hover:bg-white/10 transition-all p-2 rounded-full scale-95 active:duration-100" data-icon="share">share</button>
</nav>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-6 flex flex-col items-center min-h-screen relative overflow-hidden">
<!-- Light Confetti Effect Overlay -->
<div class="absolute inset-0 pointer-events-none confetti-overlay opacity-30"></div>
<!-- Viral Moment Header -->
<div class="text-center mb-8 relative z-10">
<span class="inline-block px-4 py-1 rounded-full bg-secondary-container text-on-secondary-container font-bold text-xs mb-3 tracking-widest uppercase">تم التخمين! ✨</span>
<h2 class="text-5xl font-black text-on-surface leading-tight tracking-tighter mb-2">تم التخمين! 🎉</h2>
<p class="text-on-surface-variant text-lg">الجولة خلصت بنجاح.</p>
</div>
<!-- Result Card (Bento Style) -->
<div class="w-full max-w-md relative z-10">
<div class="bg-surface-container-high rounded-xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.3)] relative overflow-hidden">
<!-- Decorative Glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/20 blur-[60px] rounded-full"></div>
<div class="relative flex flex-col items-center text-center">
<div class="mb-6 relative">
<div class="w-32 h-32 rounded-full p-1 bg-gradient-to-tr from-primary to-tertiary shadow-[0_0_30px_rgba(255,176,32,0.3)]">
<img alt="Player" class="w-full h-full rounded-full object-cover border-4 border-surface-container-high" data-alt="Avatar placeholder" src="https://api.dicebear.com/9.x/thumbs/png?seed=player"/>
</div>
<div class="absolute -bottom-2 -right-2 bg-secondary text-on-secondary text-xs font-bold px-3 py-1 rounded-full shadow-lg">
                            +10 نقطة
                        </div>
</div>
<p class="text-on-surface-variant text-sm font-bold uppercase tracking-widest mb-1">الهوية الحقيقية</p>
<h3 class="text-3xl font-black text-primary mb-6">كنت: —</h3>
<div class="grid grid-cols-2 gap-4 w-full">
<div class="bg-surface-container-highest p-4 rounded-lg flex flex-col items-center">
<span class="text-on-surface-variant text-xs mb-1">نقاط الجولة</span>
<span class="text-2xl font-bold text-secondary">+10</span>
</div>
<div class="bg-surface-container-highest p-4 rounded-lg flex flex-col items-center">
<span class="text-on-surface-variant text-xs mb-1">المركز الحالي</span>
<span class="text-2xl font-bold text-on-surface">#2</span>
</div>
</div>
</div>
</div>
<!-- Points Delta Chips (Viral Tags) -->
<div class="flex flex-wrap justify-center gap-3 mt-6">
<div class="bg-surface-container-highest/80 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2 border border-white/5">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
<span class="text-xs font-bold">لاعب +10</span>
</div>
<div class="bg-surface-container-highest/80 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2 border border-white/5">
<span class="w-2 h-2 rounded-full bg-error"></span>
<span class="text-xs font-bold">لاعب -5</span>
</div>
<div class="bg-surface-container-highest/80 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2 border border-white/5 opacity-60">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<span class="text-xs font-bold">لاعب +2</span>
</div>
</div>
</div>
<!-- Host Action Zone -->
<div class="mt-auto w-full max-w-md pt-8">
<button class="w-full py-5 bg-gradient-to-tr from-primary to-primary-container text-on-primary font-black text-xl rounded-lg shadow-[0_10px_30px_rgba(255,176,32,0.3)] flex items-center justify-center gap-3 active:scale-95 transition-all">
<span>الجولة اللي بعديها</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center text-on-surface-variant text-sm mt-4 font-bold opacity-70">المستضيف في انتظار بدأ الجولة التالية...</p>
</div>
</main>
<!-- Navigation Shell (Bottom) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-2 bg-white/10 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<button class="flex flex-col items-center justify-center text-white/40 p-3 hover:text-white transition-colors" title="Home">
<span class="material-symbols-outlined text-2xl" data-icon="home">home</span>
</button>
<button class="flex flex-col items-center justify-center bg-gradient-to-tr from-[#FFB020] to-[#f1a40c] text-[#0a0e16] rounded-full p-3 shadow-[0_0_20px_rgba(255,176,32,0.4)] scale-110 duration-300 ease-out" title="Games">
<span class="material-symbols-outlined text-2xl" data-icon="sports_esports" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
</button>
<button class="flex flex-col items-center justify-center text-white/40 p-3 hover:text-white transition-colors" title="Leaderboard">
<span class="material-symbols-outlined text-2xl" data-icon="leaderboard">leaderboard</span>
</button>
<button class="flex flex-col items-center justify-center text-white/40 p-3 hover:text-white transition-colors" title="Profile">
<span class="material-symbols-outlined text-2xl" data-icon="person">person</span>
</button>
</nav>
</body></html>
